<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torch Staff Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: #0b0e14; color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Left Side: Image */
        .side-image {
            flex: 1.2;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1527482797697-87c5f017ec1f?q=80&w=2070&auto=format&fit=crop'); /* Replace with your storm photo */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 50px;
        }

        .side-image h2 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* Right Side: Form */
        .login-section {
            flex: 0.8;
            background-color: #161b22;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            border-left: 1px solid #30363d;
        }

        .login-header { margin-bottom: 30px; }
        .login-header h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .login-header p { color: #8b949e; font-size: 0.9rem; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; color: #c9d1d9; font-size: 0.85rem; font-weight: 600; }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }

        /* Password Wrapper & Eye Icon */
        .pass-wrapper { position: relative; }
        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: 0.2s;
        }
        .eye-toggle:hover { opacity: 1; }

        /* Big Blue Button */
        #loginBtn {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        #loginBtn:hover { background-color: #1d4ed8; }

        @media (max-width: 900px) {
            .side-image { display: none; }
            .login-section { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="side-image">
        <div>
            <h2>TORCH</h2>
            <p>Storm Chasing & Operations</p>
        </div>
    </div>

    <section class="login-section">
        <div class="login-header">
            <h1>Staff Login</h1>
            <p>Access the mission control dashboard.</p>
        </div>

        <div class="input-group">
            <label for="email">Staff Email</label>
            <input type="email" id="email" placeholder="name@torchchasing.org">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <div class="pass-wrapper">
                <input type="password" id="password" placeholder="••••••••">
                <button type="button" class="eye-toggle" id="eyeBtn">👁️</button>
            </div>
        </div>

        <button id="loginBtn">Login to Portal</button>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe06CCbykf6zYHLwF71ngIDMwQZGmiaVI",
            authDomain: "torch-staff-portal.firebaseapp.com",
            projectId: "torch-staff-portal"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- EYE TOGGLE LOGIC ---
        const eyeBtn = document.getElementById('eyeBtn');
        const passwordInput = document.getElementById('password');

        eyeBtn.addEventListener('click', () => {
            const isPass = passwordInput.type === 'password';
            passwordInput.type = isPass ? 'text' : 'password';
            eyeBtn.textContent = isPass ? '🔒' : '👁️';
        });

        // --- LOGIN LOGIC ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = passwordInput.value;

            // 1. Domain Check
            if (!email.toLowerCase().endsWith("@torchchasing.org")) {
                alert("Access Denied: Use your @torchchasing.org email.");
                return;
            }

            // 2. Firebase Auth
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "staff.html"; 
            } catch (error) {
                alert("Login Failed: Check your credentials.");
                console.error(error.code);
            }
        });
    </script>
</body>
</html>
